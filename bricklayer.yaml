phases:
  audit:    system-prompts/repo-auditor.md
  venture:  system-prompts/venture-os.md
  agent:    system-prompts/agent-os.md
  plan:     system-prompts/plan-brain.md
  review:   system-prompts/sprint-brain.md

tools:
  verify:   bricklayer/tools/verify_files_touched.py
  test:     bricklayer/tools/run_tests_and_capture.py
  skeptic:  bricklayer/tools/make_skeptic_packet.py
  state:    bricklayer/tools/update_state.py

agents:
  nanobot_template: agents/nanobot-template/

# Test configuration — written to bricklayer/context.txt automatically on every
# bricklayer command. Changing test.command here updates context.txt instantly.
test:
  language: Python
  command: python3 -m pytest -v ../tests/

llm:
  provider: groq
  model: llama-3.1-8b-instant
  heavy_model: llama-3.3-70b-versatile
  api_key_env: GROQ_API_KEY

agents:
  nanobot_template: agents/nanobot-template/
